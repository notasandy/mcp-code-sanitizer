[project]
name = "mcp-code-sanitizer"
version = "0.1.0"
description = "MCP-сервер для анализа кода через Groq — находит баги, уязвимости и AI-галлюцинации"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "Benya" }]

dependencies = [
    "fastmcp>=2.0.0",
    "httpx>=0.27.0",
]

[project.scripts]
code-sanitizer = "server:mcp.run"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["."]