[project]
name = "mcp-code-sanitizer"
version = "0.1.0"
description = "Strict AI code reviewer MCP server powered by Groq — finds bugs, vulnerabilities and security issues"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "notasandy" }]

dependencies = [
    "fastmcp>=2.3.0",
    "httpx>=0.27.0",
    "python-dotenv>=1.0.0",
]

[project.scripts]
code-sanitizer = "server:mcp.run"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["."]